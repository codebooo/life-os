name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (created on this commit)"
        required: true
        default: "v0.1.0-alpha.1"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease

      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk lifeos-${{ steps.tag.outputs.tag }}.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: lifeos-${{ steps.tag.outputs.tag }}.apk
          generate_release_notes: true
          prerelease: true
          body: |
            **LifeOS ${{ steps.tag.outputs.tag }}** — first alpha. Signed sideload APK below.

            Install: `adb install -r -g lifeos-${{ steps.tag.outputs.tag }}.apk` (or copy to the phone and allow *Install unknown apps*).

            See README for module status and NAS-side setup (Ollama, Proton Bridge, Home Assistant).
